<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ormuz</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;}

#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 14px 0;
  pointer-events:none;
  font-family:'Share Tech Mono',monospace;
  z-index:10;
}
.hud-panel{
  background:linear-gradient(135deg,rgba(0,20,10,0.92),rgba(0,40,20,0.85));
  border:1px solid #00ff6644;
  border-radius:4px;
  padding:6px 12px;
  position:relative;overflow:hidden;
}
.hud-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#00ff66,transparent);
}
.hud-label{color:#00ff6666;font-size:9px;letter-spacing:2px;text-transform:uppercase;display:block;}
.hud-val{color:#00ff66;font-size:clamp(14px,4vw,20px);font-weight:bold;line-height:1.1;}
.hud-val span{color:#00cc44;font-size:0.65em;}
#lives-row{display:flex;gap:5px;align-items:center;margin-top:4px;}
.heart{font-size:16px;transition:all 0.3s;filter:drop-shadow(0 0 4px #ff4444);}
.heart.lost{filter:none;opacity:0.2;}

/* OVERLAY */
#overlay{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center,#001a0a 0%,#000 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:100;
  font-family:'Orbitron',sans-serif;
  overflow-y:auto;
  padding:16px;
}
.overlay-scanlines{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,100,0.015) 2px,rgba(0,255,100,0.015) 4px);
  pointer-events:none;
}
#overlay h1{
  color:#00ff66;font-size:clamp(24px,7vw,48px);font-weight:900;
  letter-spacing:4px;text-align:center;line-height:1.2;
  text-shadow:0 0 30px #00ff6688,0 0 60px #00ff6633;
}
#overlay .sub{
  color:#00cc44;font-size:clamp(9px,2.5vw,13px);
  font-family:'Share Tech Mono',monospace;
  letter-spacing:2px;text-align:center;
  border:1px solid #00ff6633;
  padding:12px 20px;line-height:1.9;max-width:340px;
}
#overlay .sub b{color:#00ff66;}
#btn-start{
  background:transparent;border:2px solid #00ff66;
  color:#00ff66;font-family:'Orbitron',sans-serif;
  font-size:clamp(14px,4vw,18px);font-weight:700;letter-spacing:4px;
  padding:14px 40px;cursor:pointer;position:relative;overflow:hidden;
  text-shadow:0 0 10px #00ff66;
  box-shadow:0 0 20px #00ff6633,inset 0 0 20px rgba(0,255,100,0.05);
}
#btn-start::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,100,0.25),transparent);
  animation:scanline 2s linear infinite;
}
@keyframes scanline{to{left:200%;}}
#btn-start:active{background:rgba(0,255,100,0.1);transform:scale(0.97);}
.gameover-score{color:#ffd600;font-size:clamp(18px,5vw,26px);font-family:'Share Tech Mono',monospace;text-shadow:0 0 15px #ffd600;}

/* RIGHT BUTTONS */
#right-btns{
  position:fixed;right:14px;bottom:14px;
  display:flex;flex-direction:column;gap:10px;align-items:flex-end;
  z-index:10;
}
.btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:8px;cursor:pointer;user-select:none;
  font-family:'Orbitron',sans-serif;font-weight:700;
  transition:transform 0.08s;position:relative;overflow:hidden;border:none;
}
.btn:active{transform:scale(0.92);}
#btn-fire{
  width:clamp(84px,21vw,108px);height:clamp(84px,21vw,108px);
  background:radial-gradient(circle at 38% 32%,#ff3030,#7a0000);
  border:2px solid #ff444466;
  box-shadow:0 0 25px #ff000055,0 4px 15px #0008;
  font-size:clamp(10px,3vw,13px);color:#fff;letter-spacing:1px;
}
#btn-fire .ic{font-size:clamp(22px,6vw,30px);line-height:1.2;}
#btn-money{
  width:clamp(68px,17vw,84px);height:clamp(68px,17vw,84px);
  background:radial-gradient(circle at 38% 32%,#ffd600,#8a6000);
  border:2px solid #ffd60055;
  box-shadow:0 0 18px #ffd60033,0 4px 10px #0008;
  font-size:clamp(9px,2.5vw,12px);color:#000;letter-spacing:1px;
}
#btn-money .ic{font-size:clamp(18px,5vw,24px);line-height:1.2;}
#btn-ammo{
  width:clamp(56px,14vw,68px);height:clamp(56px,14vw,68px);
  background:radial-gradient(circle at 38% 32%,#607d8b,#1c2c34);
  border:2px solid #546e7a55;
  box-shadow:0 0 8px #00000055,0 4px 8px #0008;
  font-size:clamp(8px,2vw,10px);color:#b0bec5;letter-spacing:1px;
}
#btn-ammo .ic{font-size:clamp(14px,4vw,18px);line-height:1.2;}
.bsub{display:block;margin-top:1px;opacity:0.8;font-family:'Share Tech Mono',monospace;font-size:0.75em;}

/* AIM ZONE */
#aim-zone{
  position:fixed;bottom:0;left:0;
  width:58%;height:55%;
  z-index:10;cursor:crosshair;
}

/* MESSAGES */
#msgs{
  position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;width:320px;text-align:center;z-index:20;
}
.fmsg{
  position:absolute;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:clamp(13px,4vw,20px);letter-spacing:2px;
  text-shadow:0 2px 10px #000;
  animation:floatup 1.4s ease-out forwards;white-space:nowrap;
}
@keyframes floatup{
  0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
  15%{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1.08);}
  100%{opacity:0;transform:translateX(-50%) translateY(-65px) scale(0.9);}
}

#flash{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity 0.05s;z-index:50;}
#level-display{
  position:fixed;bottom:14px;left:14px;
  font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:clamp(11px,3vw,15px);letter-spacing:2px;
  color:#00ff66;text-shadow:0 0 8px #00ff6688;
  pointer-events:none;z-index:10;
  background:rgba(0,20,10,0.7);border:1px solid #00ff6633;
  border-radius:4px;padding:4px 10px;
}
#level-banner{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(36px,11vw,72px);letter-spacing:6px;
  color:#00ff66;text-shadow:0 0 40px #00ff66,0 0 80px #00ff6655;
  background:rgba(0,0,0,0.7);
  border:2px solid #00ff6688;border-radius:10px;
  padding:16px 32px;
  pointer-events:none;z-index:200;
  opacity:0;transition:opacity 0.2s;
  white-space:nowrap;text-align:center;
}

/* ── LEADERBOARD & NAME INPUT ── */
#name-input{
  background:rgba(0,20,10,0.9);border:2px solid #00ff66;
  color:#00ff66;font-family:'Orbitron',sans-serif;font-size:clamp(16px,4vw,22px);
  padding:10px 16px;border-radius:6px;text-align:center;width:240px;
  outline:none;letter-spacing:2px;margin:4px 0;
}
#name-input::placeholder{color:#00ff6655;font-size:0.75em;}
.lb-screen{
  position:fixed;inset:0;background:radial-gradient(ellipse at center,#001a0a,#000);
  display:none;flex-direction:column;align-items:center;
  justify-content:flex-start;padding-top:40px;gap:0;
  z-index:150;font-family:'Share Tech Mono',monospace;overflow-y:auto;
}
.lb-screen h2{
  color:#00ff66;font-family:'Orbitron',sans-serif;font-size:clamp(18px,5vw,28px);
  letter-spacing:4px;margin-bottom:14px;text-shadow:0 0 20px #00ff6688;
}
.lb-table{width:92%;max-width:420px;border-collapse:collapse;margin-bottom:16px;}
.lb-table th{color:#00ff6688;font-size:11px;letter-spacing:2px;padding:4px 8px;border-bottom:1px solid #00ff6633;text-align:left;}
.lb-table td{color:#00cc44;font-size:clamp(12px,3vw,15px);padding:6px 8px;border-bottom:1px solid #00ff6611;}
.lb-table tr:first-child td{color:#ffd600;font-weight:bold;}
.lb-table tr:nth-child(2) td{color:#aaa;}
.lb-table tr:nth-child(3) td{color:#c97a30;}
.lb-table .rank{color:#00ff6688;width:28px;}
.lb-table .pts{text-align:right;color:#ffd600;}
.btn-lb{
  background:transparent;border:2px solid #00ff66;color:#00ff66;
  font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:3px;padding:12px 28px;cursor:pointer;border-radius:6px;
  margin:6px;transition:background 0.15s;
}
.btn-lb:active{background:rgba(0,255,100,0.1);}
.lb-loading{color:#00ff6666;font-size:13px;letter-spacing:2px;margin:20px;}

#btn-pause{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,20,10,0.85);border:1px solid #00ff6655;
  color:#00ff66;font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:2px;padding:5px 16px;border-radius:4px;
  cursor:pointer;z-index:15;display:none;
  -webkit-tap-highlight-color:transparent;
}
#pause-screen{
  position:fixed;inset:0;background:rgba(0,0,0,0.82);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:90;font-family:'Orbitron',sans-serif;
}
#pause-screen h2{color:#00ff66;font-size:clamp(24px,7vw,40px);letter-spacing:4px;text-shadow:0 0 20px #00ff6688;}
</style>
</head>
<body>
<canvas id="c"></canvas>

  </div>
  <div class="hud-panel" style="text-align:right">

    <div class="hud-val" id="sdisplay" style="color:#ffd600;text-shadow:0 0 10px #ffd60088">0</div>
  </div>
</div>

<div id="level-display" style="
  position:fixed;bottom:18px;left:18px;
  font-family:'Orbitron',sans-serif;font-weight:700;

  color:#00ff66;text-shadow:0 0 8px #00ff6688;
  background:rgba(0,20,10,0.75);border:1px solid #00ff6633;
  border-radius:4px;padding:5px 10px;
  pointer-events:none;z-index:10;
">NVX 1</div>

<!-- Level-up banner -->

<div id="msgs"></div>
<div id="flash"></div>

<div id="overlay">
  <div class="overlay-scanlines"></div>
  <h1>⚓ DÉTROIT<br>D'ORMUZ</h1>
  <div class="sub">
    🇺🇸 🇮🇱 <b>→ COULER</b> (3 impacts)<br>
    🇪🇺 <b>→ 💰 MONEY au repère jaune</b><br>
    🇷🇺 🇨🇳 <b>→ LAISSER PASSER !</b><br><br>
    <b>VISÉE :</b> Glisse sur la zone gauche<br>
    <b>3 erreurs</b> = Game Over
  </div>
  <button id="btn-start">► JOUER</button>
  <button class="btn-lb" onclick="showLeaderboard()">🏆 CLASSEMENT</button>
</div>

<!-- LEADERBOARD SCREEN -->
<div class="lb-screen" id="lb-screen">
  <h2>🏆 TOP 20 MONDIAL</h2>
  <table class="lb-table" id="lb-table">
    <tr><th class="rank">#</th><th>NOM</th><th class="pts">SCORE</th><th class="pts">NVX</th></tr>
  </table>

  <button class="btn-lb" onclick="hideLeaderboard()">◀ RETOUR</button>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);


// ═══════════════════════════════════════════════════
//  AUDIO ENGINE — Web Audio retro synth (no files)
// ═══════════════════════════════════════════════════
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function sndFire(){
  const ac=getAudio(), t=ac.currentTime;
  const osc=ac.createOscillator(), g=ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.type='square';
  osc.frequency.setValueAtTime(880,t);
  osc.frequency.exponentialRampToValueAtTime(120,t+0.18);
  g.gain.setValueAtTime(0.28,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  osc.start(t); osc.stop(t+0.18);
}

function sndHit(){
  const ac=getAudio(), t=ac.currentTime;
  // Noise burst
  const buf=ac.createBuffer(1,ac.sampleRate*0.12,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
  const src=ac.createBufferSource(), g=ac.createGain();
  const filt=ac.createBiquadFilter();
  filt.type='bandpass'; filt.frequency.value=800; filt.Q.value=2;
  src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(0.4,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  src.start(t); src.stop(t+0.12);
  // Pitch drop
  const osc=ac.createOscillator(), g2=ac.createGain();
  osc.connect(g2); g2.connect(ac.destination);
  osc.type='sawtooth'; osc.frequency.setValueAtTime(400,t);
  osc.frequency.exponentialRampToValueAtTime(60,t+0.15);
  g2.gain.setValueAtTime(0.2,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  osc.start(t); osc.stop(t+0.15);
}

function sndExplosionBig(){
  const ac=getAudio(), t=ac.currentTime;
  // Big noise burst
  const buf=ac.createBuffer(1,ac.sampleRate*0.6,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=ac.createBufferSource(), g=ac.createGain();
  const filt=ac.createBiquadFilter();
  filt.type='lowpass'; filt.frequency.value=320;
  src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(0.7,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  src.start(t); src.stop(t+0.6);
  // Low boom
  const osc=ac.createOscillator(), g2=ac.createGain();
  osc.connect(g2); g2.connect(ac.destination);
  osc.type='sine'; osc.frequency.setValueAtTime(90,t);
  osc.frequency.exponentialRampToValueAtTime(28,t+0.4);
  g2.gain.setValueAtTime(0.5,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  osc.start(t); osc.stop(t+0.4);
}

function sndCash(){
  const ac=getAudio(), t=ac.currentTime;
  // Ascending arpeggio
  const notes=[523,659,784,1047];
  notes.forEach((freq,i)=>{
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type='triangle'; osc.frequency.value=freq;
    const st=t+i*0.07;
    g.gain.setValueAtTime(0,st);
    g.gain.linearRampToValueAtTime(0.22,st+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,st+0.18);
    osc.start(st); osc.stop(st+0.18);
  });
}

function sndAlert(){
  const ac=getAudio(), t=ac.currentTime;
  const osc=ac.createOscillator(), g=ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.type='square'; osc.frequency.setValueAtTime(180,t);
  osc.frequency.setValueAtTime(120,t+0.1);
  g.gain.setValueAtTime(0.25,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  osc.start(t); osc.stop(t+0.22);
}

function sndBuyAmmo(){
  const ac=getAudio(), t=ac.currentTime;
  // Two quick blips
  [0,0.1].forEach((delay,i)=>{
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type='square'; osc.frequency.value=i===0?660:880;
    const st=t+delay;
    g.gain.setValueAtTime(0.15,st);
    g.gain.exponentialRampToValueAtTime(0.001,st+0.08);
    osc.start(st); osc.stop(st+0.08);
  });
}


function sndExtraLife(){
  // Jingle montant joyeux type 1-UP
  const freqs=[523,659,784,1047,1319];
  freqs.forEach((f,i)=>{
    playTone({type:'square',freq:f,duration:0.12,vol:0.14,delay:i*0.08});
  });
  playTone({type:'triangle',freq:1047,duration:0.3,vol:0.10,delay:0.40});
}

function sndGameOver(){
  const ac=getAudio(), t=ac.currentTime;
  const notes=[392,349,330,220];
  notes.forEach((freq,i)=>{
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type='sawtooth'; osc.frequency.value=freq;
    const st=t+i*0.22;
    g.gain.setValueAtTime(0.22,st);
    g.gain.exponentialRampToValueAtTime(0.001,st+0.3);
    osc.start(st); osc.stop(st+0.3);
  });
}

function sndLoseLife(){
  const ac=getAudio(), t=ac.currentTime;
  const osc=ac.createOscillator(), g=ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(440,t);
  osc.frequency.exponentialRampToValueAtTime(55,t+0.5);
  g.gain.setValueAtTime(0.3,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  osc.start(t); osc.stop(t+0.5);
}

// STATE
let money=0,ammo=8,lives=3,score=0,level=1,gameRunning=false,gamePaused=false;
let ships=[],bullets=[],exps=[],parts=[],crates=[];
let frame=0,spawnT=0,spawnI=210,rafId=null,shipsSinceEU=0,nextEUIn=4;

// CANNON pos (Iran coast top-center)
const CX=()=>W*0.46;
const CY=()=>H*0.13;

// AIM — joystick
let aimAngle = -0.3; // offset from straight-down; negative=left, positive=right
const AIM_MIN = -1.1;
const AIM_MAX =  1.1;
// Joystick state
let joyActive=false, joyOriginX=0, joyOriginY=0, joyDX=0, joyDY=0;
const JOY_RADIUS=85; // max joystick travel

// Marker
const MX=()=>W*0.28;

// FACTIONS
const FACTIONS=[
  {id:'us',    emoji:'🇺🇸',type:'enemy', col:'#1a3a7e',hp:3},
  {id:'il',    emoji:'🇮🇱',type:'enemy', col:'#2255aa',hp:3},
  {id:'ru',    emoji:'🇷🇺',type:'ally',  col:'#8B1a1a',hp:99},
  {id:'cn',    emoji:'🇨🇳',type:'ally',  col:'#aa2222',hp:99},
  {id:'eu',    emoji:'🇪🇺',type:'eu',    col:'#224488',hp:99},
];

// NOISE TEXTURE
const nCv=document.createElement('canvas');
nCv.width=nCv.height=256;
const nCtx=nCv.getContext('2d');
(()=>{
  const id=nCtx.createImageData(256,256);
  for(let i=0;i<id.data.length;i+=4){
    const v=Math.random()*25|0;
    id.data[i]=v;id.data[i+1]=v+5;id.data[i+2]=v;id.data[i+3]=16;
  }
  nCtx.putImageData(id,0,0);
})();

let wt=0;

function drawBG(){
  // Deep ocean base
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#07121c');
  bg.addColorStop(1,'#060e15');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Iran coast (top sandy band)
  drawCoast(true);
  // Water
  drawWater();
  // UAE coast (bottom)
  drawCoast(false);
  // Tactical grid
  ctx.save();
  ctx.globalAlpha=0.035;
  ctx.strokeStyle='#00ff66';
  ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}

function drawCoast(isTop){
  ctx.save();
  if(isTop){
    const g=ctx.createLinearGradient(0,0,0,H*0.2);
    g.addColorStop(0,'#c09050');g.addColorStop(0.7,'#9a7030');g.addColorStop(1,'#6a4a18');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(0,0);ctx.lineTo(W,0);
    ctx.lineTo(W,H*0.055);
    ctx.bezierCurveTo(W*0.75,H*0.075,W*0.55,H*0.035,W*0.46,H*0.095);
    ctx.bezierCurveTo(W*0.38,H*0.145,W*0.18,H*0.18,0,H*0.12);
    ctx.closePath();ctx.fill();
    // Rocky detail
    ctx.globalAlpha=0.25;
    for(let i=0;i<50;i++){
      ctx.fillStyle=`rgba(${80+Math.random()*50|0},${55+Math.random()*35|0},${15+Math.random()*20|0},1)`;
      ctx.beginPath();
      ctx.ellipse(Math.random()*W,Math.random()*H*0.13,Math.random()*22+3,Math.random()*9+2,Math.random()*Math.PI,0,Math.PI*2);
      ctx.fill();
    }
  } else {
    const g=ctx.createLinearGradient(0,H*0.52,0,H);
    g.addColorStop(0,'#6a4a18');g.addColorStop(0.4,'#9a7030');g.addColorStop(1,'#c8a860');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(0,H*0.52);
    ctx.bezierCurveTo(W*0.35,H*0.58,W*0.65,H*0.54,W,H*0.50);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
    // Desert ripples
    ctx.globalAlpha=0.10;
    ctx.strokeStyle='#c8a860';ctx.lineWidth=1;
    for(let i=0;i<18;i++){
      const y=H*0.58+i*(H*0.025);
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    }
  }
  ctx.restore();
}

function drawWater(){
  // Water body between coasts
  const wg=ctx.createLinearGradient(0,H*0.09,0,H*0.52);
  wg.addColorStop(0,'#0c3550');wg.addColorStop(0.5,'#0a4060');wg.addColorStop(1,'#083545');
  ctx.fillStyle=wg;
  ctx.beginPath();
  ctx.moveTo(0,H*0.12);
  ctx.bezierCurveTo(W*0.18,H*0.18,W*0.38,H*0.145,W*0.46,H*0.095);
  ctx.bezierCurveTo(W*0.55,H*0.035,W*0.75,H*0.075,W,H*0.055);
  ctx.lineTo(W,H*0.50);
  ctx.bezierCurveTo(W*0.65,H*0.54,W*0.35,H*0.58,0,H*0.52);
  ctx.closePath();ctx.fill();

  // Shimmer waves
  ctx.save();
  ctx.globalAlpha=0.06;
  for(let i=0;i<10;i++){
    const y=H*0.16+(i/10)*(H*0.30)+Math.sin(wt*0.8+i*1.3)*5;
    ctx.strokeStyle='#7ee8ff';
    ctx.lineWidth=1+Math.sin(wt+i)*0.4;
    ctx.setLineDash([18+i*3,14]);
    ctx.beginPath();ctx.moveTo(0,y);
    ctx.bezierCurveTo(W*0.33,y+7,W*0.66,y-5,W,y+4);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  // Noise
  ctx.globalAlpha=0.05;
  try{ctx.fillStyle=ctx.createPattern(nCv,'repeat');ctx.fillRect(0,0,W,H);}catch(e){}
  ctx.restore();
}

// ──────────────────────────────────────────────
// AIM ZONE VISUAL
// ──────────────────────────────────────────────
function drawAimZone(){
  const cx=CX(),cy=CY();
  const r=Math.min(W,H)*0.36;
  ctx.save();

  // Arc bg — centered on Math.PI/2 (straight down), spanning AIM_MIN..AIM_MAX offset
  const arcStart = Math.PI/2 + AIM_MIN;
  const arcEnd   = Math.PI/2 + AIM_MAX;
  ctx.globalAlpha=0.06;
  ctx.strokeStyle='#00ff66';ctx.lineWidth=38;ctx.lineCap='butt';
  ctx.beginPath();
  ctx.arc(cx,cy,r,arcStart,arcEnd);
  ctx.stroke();

  // Tick marks
  ctx.lineWidth=1.5;ctx.lineCap='round';
  const steps=12;
  for(let i=0;i<=steps;i++){
    const a=AIM_MIN+(AIM_MAX-AIM_MIN)*(i/steps);
    const dir=Math.PI/2+a;
    const isMajor=i%3===0;
    ctx.globalAlpha=isMajor?0.45:0.22;
    ctx.strokeStyle='#00ff66';
    const r1=r-(isMajor?22:14),r2=r+(isMajor?22:14);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(dir)*r1,cy+Math.sin(dir)*r1);
    ctx.lineTo(cx+Math.cos(dir)*r2,cy+Math.sin(dir)*r2);
    ctx.stroke();
  }

  // Current aim dot on arc
  const curDir=Math.PI/2+aimAngle;
  // Glow ring
  ctx.globalAlpha=0.18;
  ctx.fillStyle='#00ff66';
  ctx.beginPath();ctx.arc(cx+Math.cos(curDir)*r,cy+Math.sin(curDir)*r,18,0,Math.PI*2);ctx.fill();
  // Dot
  ctx.globalAlpha=0.9+0.1*Math.sin(frame*0.15);
  ctx.shadowColor='#00ff66';ctx.shadowBlur=20;
  ctx.fillStyle='#00ff66';
  ctx.beginPath();ctx.arc(cx+Math.cos(curDir)*r,cy+Math.sin(curDir)*r,9,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Hint text
  if(frame<180 && !joyActive){
    ctx.globalAlpha=(1-frame/180)*0.55;
    ctx.fillStyle='#00ff66';
    ctx.font=`10px 'Share Tech Mono',monospace`;
    ctx.textAlign='center';
    ctx.fillText('👆 POSE LE DOIGT POUR VISER',cx,cy+r+42);
  }

  // Joystick visual
  if(joyActive){
    // Outer ring
    ctx.globalAlpha=0.22;
    ctx.strokeStyle='#00ff66';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(joyOriginX,joyOriginY,JOY_RADIUS,0,Math.PI*2);ctx.stroke();
    // Cross hairs on ring
    ctx.globalAlpha=0.15;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(joyOriginX-JOY_RADIUS-10,joyOriginY);ctx.lineTo(joyOriginX+JOY_RADIUS+10,joyOriginY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(joyOriginX,joyOriginY-JOY_RADIUS-10);ctx.lineTo(joyOriginX,joyOriginY+JOY_RADIUS+10);ctx.stroke();
    // Line from origin to thumb
    const clampedDX=joyDX, clampedDY=joyDY;
    ctx.globalAlpha=0.5;
    ctx.strokeStyle='#00ff66';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(joyOriginX,joyOriginY);ctx.lineTo(joyOriginX+clampedDX,joyOriginY+clampedDY);ctx.stroke();
    // Thumb dot
    ctx.globalAlpha=0.9;
    ctx.fillStyle='#00ff66';ctx.shadowColor='#00ff66';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(joyOriginX+clampedDX,joyOriginY+clampedDY,13,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Center dot
    ctx.globalAlpha=0.5;
    ctx.fillStyle='#00ff6688';
    ctx.beginPath();ctx.arc(joyOriginX,joyOriginY,5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ──────────────────────────────────────────────
// CANNON
// ──────────────────────────────────────────────
function drawCannon(){
  const cx=CX(),cy=CY();
  const barrelDir=Math.PI/2+aimAngle; // straight down + offset
  const bLen=36;
  const tx=cx+Math.cos(barrelDir)*Math.min(W,H)*0.5;
  const ty=cy+Math.sin(barrelDir)*Math.min(W,H)*0.5;

  ctx.save();
  // Trajectory dashed line
  ctx.globalAlpha=0.3;
  ctx.strokeStyle='#00ff66';ctx.lineWidth=1;ctx.setLineDash([8,7]);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(tx,ty);ctx.stroke();
  ctx.setLineDash([]);

  // Aim crosshair at end
  ctx.globalAlpha=0.35+0.25*Math.sin(frame*0.13);
  ctx.strokeStyle='#00ff66';ctx.lineWidth=1.5;
  const cr=8;
  ctx.beginPath();ctx.arc(tx,ty,cr,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(tx-cr-4,ty);ctx.lineTo(tx+cr+4,ty);ctx.stroke();
  ctx.beginPath();ctx.moveTo(tx,ty-cr-4);ctx.lineTo(tx,ty+cr+4);ctx.stroke();

  ctx.globalAlpha=1;
  ctx.shadowColor='#00ff6644';ctx.shadowBlur=12;

  // Base
  ctx.fillStyle='#182820';ctx.strokeStyle='#00ff6677';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(cx,cy,24,11,0,0,Math.PI*2);ctx.fill();ctx.stroke();

  // Turret
  ctx.fillStyle='#243c2c';ctx.strokeStyle='#00ff66aa';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,14,0,Math.PI*2);ctx.fill();ctx.stroke();

  // Barrel
  ctx.lineCap='round';
  ctx.strokeStyle='#90a878';ctx.lineWidth=9;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(barrelDir)*bLen,cy+Math.sin(barrelDir)*bLen);ctx.stroke();
  ctx.strokeStyle='#c8ddb8';ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(barrelDir)*bLen,cy+Math.sin(barrelDir)*bLen);ctx.stroke();

  // Muzzle
  ctx.fillStyle='#7a9068';
  ctx.beginPath();ctx.arc(cx+Math.cos(barrelDir)*bLen,cy+Math.sin(barrelDir)*bLen,5,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // Angle readout
  ctx.save();
  ctx.font=`bold 10px 'Share Tech Mono',monospace`;
  ctx.fillStyle='#00ff6688';ctx.textAlign='left';
  const deg=Math.round((aimAngle/Math.PI)*180);
  ctx.fillText(`AIM ${deg}°`,cx+28,cy-18);
  ctx.restore();
}

function spawnShip(){
  // Spawn garanti : 1 EU tous les 4-6 bateaux, jamais 2 EU d'affilée
  // Les autres slots : 50% ennemi, 50% allié
  let f;
  shipsSinceEU++;
  const forceEU = shipsSinceEU >= nextEUIn;
  if(forceEU){
    f = FACTIONS[4]; // EU
    shipsSinceEU = 0;
    nextEUIn = 4 + Math.floor(Math.random()*3); // prochain EU dans 4, 5 ou 6 bateaux
  } else {
    const roll = Math.random();
    f = roll<0.35?FACTIONS[0]:   // US
        roll<0.70?FACTIONS[1]:   // Israel
        roll<0.85?FACTIONS[2]:   // Russia
                  FACTIONS[3];   // China
  }
  const y1=H*0.17,y2=H*0.48;
  const shipH=32, minGap=shipH*4;
  let y=y1+Math.random()*(y2-y1);
  for(let attempt=0;attempt<12;attempt++){
    const c=y1+Math.random()*(y2-y1);
    if(!ships.some(s=>Math.abs(s.y-c)<minGap)){y=c;break;}
  }
  ships.push({
    x:W+110,y,
    spd:(W/480)*(0.9+Math.random()*0.35)*getLevelSpeed(),
    f,hp:f.hp,maxHp:f.hp,
    w:Math.min(W*0.16,130),h:shipH,
    flash:0,moneyDone:false,
    bob:Math.random()*Math.PI*2,
  });
}

let crateSpawnCounter = 0;

function lerpColor(a,b,t){
  const ra=parseInt(a.slice(1,3),16),ga=parseInt(a.slice(3,5),16),ba2=parseInt(a.slice(5,7),16);
  const rb=parseInt(b.slice(1,3),16),gb=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  return `rgb(${ra+(rb-ra)*t|0},${ga+(gb-ga)*t|0},${ba2+(bb-ba2)*t|0})`;
}

function drawShip(s){
  const by=Math.sin(wt*1.1+s.bob)*2;
  ctx.save();ctx.translate(s.x,s.y+by);
  const hw=s.w/2,hh=s.h/2;

  if(s.flash>0){ctx.shadowColor='#ff4444';ctx.shadowBlur=30;}

  // Wake
  ctx.globalAlpha=0.15;ctx.fillStyle='#9ee8ff';
  ctx.beginPath();ctx.ellipse(hw+14,0,24,7,0,0,Math.PI*2);ctx.fill();

  ctx.globalAlpha=1;
  // Sillage (wake) derrière la poupe
  ctx.fillStyle='rgba(180,230,255,0.18)';
  for(let i=1;i<=3;i++){
    ctx.beginPath();ctx.ellipse(hw+10+i*9,0,10-i*2,hh*0.4,0,0,Math.PI*2);ctx.fill();
  }

  // Coque — forme navire vue de dessus: proue pointue à gauche, poupe arrondie à droite
  const hg=ctx.createLinearGradient(-hw,-hh,hw,hh);
  hg.addColorStop(0,lerpColor(s.f.col,'#fff',0.3));
  hg.addColorStop(0.5,s.f.col);
  hg.addColorStop(1,lerpColor(s.f.col,'#000',0.25));
  ctx.fillStyle=hg;
  ctx.beginPath();
  ctx.moveTo(-hw, 0);                              // proue (pointe gauche)
  ctx.bezierCurveTo(-hw+10,-hh*0.5, hw*0.2,-hh, hw*0.55,-hh);
  ctx.bezierCurveTo(hw+6,-hh*0.5, hw+6,hh*0.5, hw*0.55,hh);
  ctx.bezierCurveTo(hw*0.2,hh, -hw+10,hh*0.5, -hw,0);
  ctx.closePath();ctx.fill();

  // Contour coque
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.stroke();

  // Pont (deck) — bande longitudinale claire
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(-hw*0.4,-hh*0.4);ctx.lineTo(hw*0.5,-hh*0.4);
  ctx.lineTo(hw*0.6,0);ctx.lineTo(hw*0.5,hh*0.4);
  ctx.lineTo(-hw*0.4,hh*0.4);ctx.closePath();ctx.fill();

  // Superstructure (passerelle) — bloc plus clair
  ctx.fillStyle='rgba(255,255,255,0.13)';
  ctx.beginPath();ctx.roundRect(-hw*0.2,-hh*0.55,hw*0.5,hh*1.1,3);ctx.fill();
  // Fenêtres
  ctx.fillStyle='rgba(150,220,255,0.5)';
  for(let i=0;i<3;i++) ctx.fillRect(-hw*0.12+i*hw*0.16,-hh*0.35,hw*0.1,hh*0.35);

  // Cheminée
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath();ctx.ellipse(hw*0.1,0,hw*0.08,hh*0.2,0,0,Math.PI*2);ctx.fill();

  // Flag — fond blanc discret pour forcer l'opacité sur Android
  ctx.shadowBlur=0;
  ctx.globalAlpha=1;
  const flagSize=Math.round(s.h*0.85);
  const fr=flagSize*0.52;
  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.beginPath();ctx.ellipse(0,0,fr,fr*0.7,0,0,Math.PI*2);ctx.fill();
  ctx.font=`${flagSize}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(s.f.emoji,0,0);

  // HP bar
  if(s.f.type==='enemy'){
    const bw=s.w*0.7;
    ctx.fillStyle='#330000';ctx.fillRect(-bw/2,-hh-11,bw,5);
    ctx.fillStyle='#ff4444';ctx.fillRect(-bw/2,-hh-11,bw*(s.hp/s.maxHp),5);
  }

  // EU money pulse
  if(s.f.type==='eu'&&!s.moneyDone&&Math.abs(s.x-MX())<s.w*1.6){
    ctx.globalAlpha=0.55+0.45*Math.sin(frame*0.35);
    ctx.font=`${Math.round(s.h*0.85)}px serif`;
    ctx.fillText('💰',0,-hh-14);
  }
  ctx.restore();
}

function drawBullet(b){

  for(let i=0;i<b.trail.length;i++){
    const t=b.trail[i],p=i/b.trail.length;
    ctx.globalAlpha=p*0.55;
    ctx.fillStyle=`hsl(${38+p*18},100%,${48+p*28}%)`;

  ctx.shadowColor='#ffd600';ctx.shadowBlur=16;

function drawExp(e){
  ctx.save();
  if(e.isRing){
    ctx.globalAlpha=(e.life/e.maxLife)*0.6;

  ctx.restore();

function collide(){
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    // Trier: ennemis d'abord pour qu'ils absorbent le tir en cas de chevauchement
    const sorted=[...ships].sort((a,b)=>a.f.type==='enemy'?-1:1);
    for(let si=0;si<sorted.length;si++){
      const s=sorted[si];
      if(b.x>s.x-s.w/2&&b.x<s.x+s.w/2&&b.y>s.y-s.h/2-4&&b.y<s.y+s.h/2+4){
        bullets.splice(bi,1);boom(b.x,b.y,false);
        if(s.f.type==='enemy'){
          s.hp--;s.flash=12;
          if(s.hp<=0){boom(s.x,s.y,true);sndExplosionBig();score+=2;checkLevel();updateHUD();showMsg('💥 COULÉ ! +2','#4caf50');const ri=ships.indexOf(s);if(ri>-1)ships.splice(ri,1);}
          else{sndHit();sndExplosionSmall();showMsg('HIT !','#ff9800');}
        } else {
          s.flash=12;
          if(s.f.type==='ally') showMsg('⚠ ALLIÉ TOUCHÉ !','#ff5252');
          else showMsg('⚠ TIR INTERDIT !','#ff5252');

// CRATES — rare, give +1 life, 1-shot, small hitbox
// ──────────────────────────────────────────────
let crateTimer=0;
const CRATE_INTERVAL=1800; // frames (~60s at 60fps) — very rare
const CRATE_VARIANCE=900;  // +/- 15s randomness

function spawnCrate(){
  const y1=H*0.19, y2=H*0.46;
  const y=y1+Math.random()*(y2-y1);
  crates.push({
    x: W+60, y,
    spd: (W/1400)*(0.7+Math.random()*0.4)*getLevelSpeed(), // slower than ships
    w: 22, h: 22, // small hitbox
    bob: Math.random()*Math.PI*2,
    flash: 0,
    spin: 0,
  });
}

function updateCrates(){
  crateTimer++;
  if(crateTimer >= CRATE_INTERVAL + Math.random()*CRATE_VARIANCE - CRATE_VARIANCE/2){
    crateTimer=0;
    spawnCrate();
  }
  crates.forEach(c=>{ c.x-=c.spd; c.spin+=0.04; if(c.flash>0)c.flash--; });
  crates=crates.filter(c=>c.x > -80);
}

function drawCrate(c){
  const by=Math.sin(wt*0.9+c.bob)*2.5;
  ctx.save();
  ctx.translate(c.x, c.y+by);

  if(c.flash>0){ ctx.shadowColor='#ff4444'; ctx.shadowBlur=20; }

  // Glow pulse
  const pulse=0.5+0.5*Math.sin(wt*2+c.bob);
  ctx.shadowColor='#ff4488';
  ctx.shadowBlur=8+pulse*10;

  // Crate body
  const s=c.w/2;
  ctx.fillStyle='#5d3a1a';
  ctx.strokeStyle='#c97a30';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.rect(-s,-s,c.w,c.h);
  ctx.fill(); ctx.stroke();

  // Cross braces
  ctx.strokeStyle='#c97a3088';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-s,0); ctx.lineTo(s,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,s); ctx.stroke();

  // Heart icon on top
  ctx.shadowBlur=0;
  ctx.font=`${Math.round(c.w*0.9)}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.globalAlpha=0.75+0.25*pulse;
  ctx.fillText('❤',0,0);

  ctx.restore();
}

function collideCrates(){
  for(let bi=bullets.length-1; bi>=0; bi--){
    const b=bullets[bi];
    for(let ci=crates.length-1; ci>=0; ci--){
      const c=crates[ci];
      // Small hitbox — use crate actual w/h (22x22)
      if(b.x>c.x-c.w/2 && b.x<c.x+c.w/2 && b.y>c.y-c.h/2 && b.y<c.y+c.h/2){
        bullets.splice(bi,1);
        crates.splice(ci,1);
        lives++;
        updateHUD();
        sndExtraLife();
        // Heart particles
        for(let i=0;i<16;i++){
          const a=Math.random()*Math.PI*2;
          parts.push({x:c.x,y:c.y,
            vx:Math.cos(a)*(1.5+Math.random()*3),
            vy:Math.sin(a)*(1.5+Math.random()*3)-2,
            life:50+Math.random()*30,maxLife:80,
            r:3+Math.random()*4,col:'#ff4488'});
        }
        showMsg('+1 ❤ VIE !','#ff4488');
        break;
      }
    }
  }
}

// ──────────────────────────────────────────────
function checkLevel(){

    level = newLevel;
    sndBuyAmmo();

      banner.style.opacity = '1';
      clearTimeout(banner._t);
      banner._t = setTimeout(()=>{ banner.style.opacity='0'; }, 2000);
    }
  }
}

function getLevelSpeed(){
  // Each level adds 18% speed on top of base
  return 1 + (level - 1) * 0.22;
}

function update(){
  wt+=0.033;frame++;
  spawnT++;
  if(spawnT>=spawnI){
    spawnT=0;spawnI=Math.max(65,spawnI-0.9);
    spawnShip();
    crateSpawnCounter++;
    // Spawn caisse: 1 chance sur 18, jamais si déjà 1 à l'écran
    if(crateSpawnCounter>=CRATE_EVERY && crates.length===0 && Math.random()<0.45){
      crateSpawnCounter=0;
      spawnCrate();
    } else if(crateSpawnCounter>=CRATE_EVERY){
      crateSpawnCounter=0;
    }
  }
  ships.forEach(s=>{s.x-=s.spd;if(s.flash>0)s.flash--;});
  bullets.forEach(b=>{b.trail.push({x:b.x,y:b.y});if(b.trail.length>13)b.trail.shift();b.x+=b.vx;b.y+=b.vy;b.life--;});
  bullets=bullets.filter(b=>b.life>0&&b.x>-60&&b.x<W+60&&b.y>-60&&b.y<H+60);
  exps.forEach(e=>{e.x+=e.vx;e.y+=e.vy;e.vx*=0.93;e.vy*=0.93;if(e.isRing)e.ring+=5;e.life--;});
  exps=exps.filter(e=>e.life>0);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.life--;});
  parts=parts.filter(p=>p.life>0);
  crates.forEach(c=>{c.x-=c.spd; if(c.flash>0)c.flash--;});
  crates=crates.filter(c=>c.x>-60);
  collideCrates();
  updateCrates();collideCrates();collide();checkExits();
}

function loop(){
  if(!gameRunning||gamePaused)return;
  update();
  ctx.clearRect(0,0,W,H);
  drawBG();
  drawMarker();
  drawAimZone();
  crates.forEach(drawCrate);
  ships.forEach(drawShip);
  crates.forEach(drawCrate);
  bullets.forEach(drawBullet);
  exps.forEach(drawExp);
  drawParts();
  drawCannon();
  rafId=requestAnimationFrame(loop);
}

function onAimMove(e){
  e.preventDefault();
  if(!joyActive)return;
  const t=e.touches?e.touches[0]:e;
  let dx=t.clientX-joyOriginX;
  let dy=t.clientY-joyOriginY;
  // Clamp to joystick radius
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>JOY_RADIUS){dx=dx/dist*JOY_RADIUS;dy=dy/dist*JOY_RADIUS;}
  joyDX=dx; joyDY=dy;
  // Map horizontal joystick position to aim angle
  // left = negative angle (aim left), right = positive (aim right)
  aimAngle=-(dx/JOY_RADIUS)*AIM_MAX;
}
function onAimUp(e){joyActive=false;joyDX=0;joyDY=0;}

// AC unified into getAudio()

function resumeAC(){const ac=getAudio();if(ac.state==='suspended')ac.resume();}

function playTone(opts){
  resumeAC();
  const {type='square',freq=440,freq2=freq,duration=0.15,vol=0.18,delay=0,distortion=false}=opts;
  const t=getAudio().currentTime+delay;
  const _ac2=getAudio();
  const osc=_ac2.createOscillator();
  const gain=_ac2.createGain();

  let node=osc;
  if(distortion){
    const ws=_ac2.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x<0?-Math.pow(-x,0.6):Math.pow(x,0.6);}
    ws.curve=curve;
    osc.connect(ws);ws.connect(gain);
  } else {
    osc.connect(gain);
  }
  gain.connect(getAudio().destination);

  osc.type=type;
  osc.frequency.setValueAtTime(freq,t);
  if(freq2!==freq) osc.frequency.exponentialRampToValueAtTime(Math.max(1,freq2),t+duration);
  gain.gain.setValueAtTime(vol,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+duration);
  osc.start(t);
  osc.stop(t+duration+0.01);
}

// ═══════════════════════════════════════════════════
//  MUSIC ENGINE — Sparse retro ambient
//  Inspired by NES menu/ambient tracks (Castlevania, Metroid feel)
//  100% Web Audio synthesis — no files, no copyright
// ═══════════════════════════════════════════════════
let musicNodes = [];
let musicScheduler = null;
let musicPlaying = false;
let musicBeat = 0;

// A natural minor — dark, tense, sparse
// A2  C3   E3   G3   A3   C4   E4   G4   A4
const MN = [110, 130.81, 164.81, 196, 220, 261.63, 329.63, 392, 440, 523.25];

// Melody: slow, spacious (each entry = 1 bar of 8 steps at ~72bpm)
// -1 = rest, index into MN
const MEL = [
  [4,5,4,-1, 5,-1,4,-1],
  [4,-1,3,-1, 4,-1,-1,-1],
  [2,-1,3,-1, 3,-1,2,-1],
  [4,-1,-1,-1, 4,-1,5,-1],
  [5,-1,6,-1, 6,-1,5,-1],
  [5,-1,4,-1, 5,-1,-1,-1],
  [4,-1,3,-1, 3,-1,2,-1],
  [2,-1,-1,-1, 4,-1,-1,-1],
];

// Bass pulse: simple root note every 2 steps
const BLINE = [0,-1,0,-1, 0,-1,2,-1];

const MBPM  = 88;
const MSTEP = 60 / MBPM / 2; // 8th note
const MBAR  = MSTEP * 8;

function mNote(ac, freq, t, dur, type, vol, filt=800){
  const o=ac.createOscillator(), g=ac.createGain(), f=ac.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=filt;
  o.connect(f); f.connect(g); g.connect(ac.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.001,t);
  g.gain.linearRampToValueAtTime(vol,t+0.012);
  g.gain.setValueAtTime(vol,t+dur*0.55);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur+0.01);
  musicNodes.push(o);
}

function mNoise(ac, t, vol=0.04){
  // Subtle shimmer percussion — very soft hi-hat
  const buf=ac.createBuffer(1,ac.sampleRate*0.03,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=ac.createBufferSource(), g=ac.createGain(), f=ac.createBiquadFilter();
  f.type='highpass'; f.frequency.value=9000;
  src.buffer=buf; src.connect(f); f.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.025);
  src.start(t); src.stop(t+0.04);
  musicNodes.push(src);
}

function mKick(ac, t){
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type='sine';
  o.frequency.setValueAtTime(90,t);
  o.frequency.exponentialRampToValueAtTime(28,t+0.14);
  g.gain.setValueAtTime(0.22,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  o.start(t); o.stop(t+0.2);
  musicNodes.push(o);
}

function scheduleBar(ac, barStart, barIdx){
  const melPat = MEL[barIdx % MEL.length];
  for(let s=0;s<8;s++){
    const t = barStart + s*MSTEP;

    // Kick on beat 1 and beat 5 (steps 0 and 4)
    if(s===0) mKick(ac, t);
    if(s===4) mKick(ac, t);

    // Very soft hi-hat on every step (sparse shimmer)
    if(s%2===0) mNoise(ac, t, 0.028);

    // Bass — low pulse
    const bi = BLINE[s];
    if(bi>=0) mNote(ac, MN[bi], t, MSTEP*1.6, 'square', 0.11, 400);

    // Melody — triangle for soft timbre
    const mi = melPat[s];
    if(mi>=0) mNote(ac, MN[mi], t, MSTEP*2.2, 'triangle', 0.09, 1400);

    // Occasional high shimmer arpeggio on bar 3 & 7
    if((barIdx%4===2) && s%2===1){
      mNote(ac, MN[6+s%2]*1.5, t, MSTEP*0.7, 'triangle', 0.035, 2000);
    }
  }
}

function scheduleMusicLoop(){
  if(!musicPlaying) return;
  const ac=getAudio();
  const now=ac.currentTime;
  const t0=now+0.001;
  scheduleBar(ac, t0,           musicBeat);
  scheduleBar(ac, t0+MBAR,      musicBeat+1);
  scheduleBar(ac, t0+MBAR*2,    musicBeat+2);
  scheduleBar(ac, t0+MBAR*3,    musicBeat+3);
  musicBeat+=4;
  musicScheduler=setTimeout(scheduleMusicLoop, (MBAR*4-0.3)*1000);
}

function startMusic(){
  if(musicPlaying) return;
  musicPlaying=true; musicBeat=0;
  // AC already resumed by handleStart before startGame() was called
  scheduleMusicLoop();
}

function stopMusic(){
  musicPlaying=false;
  if(musicScheduler) clearTimeout(musicScheduler);
  musicScheduler=null;
  musicNodes.forEach(n=>{try{n.stop();}catch(e){}});
  musicNodes=[];
}

function drawTrump(){
  const cv = document.getElementById('trump-canvas');
  if(!cv){ if(trumpRAF) cancelAnimationFrame(trumpRAF); return; }
  const c = cv.getContext('2d');
  const CW = cv.width, CH = cv.height;
  trumpFrame++;
  const bob  = Math.sin(trumpFrame * 0.14) * 3;
  const jaw  = Math.abs(Math.sin(trumpFrame * 0.48)) * 24;
  const tilt = Math.sin(trumpFrame * 0.10) * 0.04;
  c.clearRect(0, 0, CW, CH);
  c.save();
  c.translate(CW/2, CH/2 + bob);
  c.rotate(tilt);
  const scale = CW / 240;
  const tW = CW, tH = Math.round(132 * scale);
  const bW = CW, bH = Math.round(68  * scale);
  const startY = -(tH + bH) / 2;
  if(_trumpTop.complete && _trumpTop.naturalWidth > 0)
    c.drawImage(_trumpTop, -tW/2, startY, tW, tH);
  if(_trumpBot.complete && _trumpBot.naturalWidth > 0)
    c.drawImage(_trumpBot, -bW/2, startY + tH + jaw, bW, bH);
  if(jaw > 2){
    c.fillStyle = '#111';
    c.fillRect(-tW/2, startY + tH, tW, jaw + 1);
    c.fillStyle = '#fffff0';
    c.fillRect(-tW*0.22, startY + tH + 1, tW*0.44, Math.min(jaw*0.4, 11));
  }
  c.restore();
  trumpRAF = requestAnimationFrame(drawTrump);
}

async function fetchScores(){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${LB_BIN_ID}/latest`,{
      headers:{'X-Master-Key':LB_API_KEY}
    });
    const d=await r.json();
    return d.record.scores||[];
  }catch(e){ return []; }
}

async function saveScores(scores){
  await fetch(`https://api.jsonbin.io/v3/b/${LB_BIN_ID}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':LB_API_KEY},
    body:JSON.stringify({scores})
  });
}

async function submitScore(){
  const inp=document.getElementById('name-input');
  const btn=document.getElementById('btn-submit-score');
  const name=(inp?inp.value.trim().toUpperCase():'').slice(0,16)||'ANONYME';
  if(btn){btn.textContent='⏳ ENVOI...';btn.disabled=true;}
  const scores=await fetchScores();
  scores.push({name,score,level,date:new Date().toLocaleDateString('fr-FR')});
  scores.sort((a,b)=>b.score-a.score);
  const top20=scores.slice(0,20);
  await saveScores(top20);
  if(btn){btn.textContent='✅ ENREGISTRÉ !';btn.disabled=true;}
}

async function showLeaderboard(){
  const lb=document.getElementById('lb-screen');
  const loading=document.getElementById('lb-loading');
  const table=document.getElementById('lb-table');
  if(!lb) return;
  lb.style.display='flex';
  loading.style.display='block';
  // Clear old rows
  while(table.rows.length>1) table.deleteRow(1);
  const scores=await fetchScores();
  loading.style.display='none';
  if(scores.length===0){
    const tr=table.insertRow();
    const td=tr.insertCell();td.colSpan=4;
    td.style.cssText='text-align:center;color:#00ff6644;padding:20px;';
    td.textContent='Aucun score encore — sois le premier !';
    return;
  }
  scores.forEach((s,i)=>{
    const tr=table.insertRow();
    tr.innerHTML=`<td class="rank">${i+1}</td><td>${s.name}</td><td class="pts">${s.score}</td><td class="pts">${s.level||'?'}</td>`;
  });
}

function hideLeaderboard(){
  const lb=document.getElementById('lb-screen');
  if(lb) lb.style.display='none';
}
